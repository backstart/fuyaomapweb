<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fuyao Embedded Map</title>
  <link rel="stylesheet" href="./vendor/maplibre-gl.css" />
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #edf2f7;
      color: #213446;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(76, 132, 255, 0.12), transparent 34%),
        linear-gradient(180deg, #f4f7fa 0%, #e7edf4 100%);
    }

    body {
      position: relative;
    }

    #embedded-map {
      width: 100%;
      height: 100%;
    }

    .panel {
      position: absolute;
      z-index: 10;
      left: 14px;
      top: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: min(360px, calc(100vw - 28px));
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 40px rgba(33, 52, 70, 0.14);
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .title-row strong {
      font-size: 15px;
      letter-spacing: 0.02em;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 54px;
      padding: 3px 9px;
      border-radius: 999px;
      background: #15324f;
      color: #f7fbff;
      font-size: 11px;
      letter-spacing: 0.08em;
    }

    .hint,
    .coords,
    .error {
      margin: 0;
      font-size: 12px;
      line-height: 1.5;
    }

    .hint {
      color: #506274;
    }

    .coords {
      color: #203243;
      font-variant-numeric: tabular-nums;
    }

    .error {
      color: #ba3e2f;
    }

    .footer {
      position: absolute;
      right: 14px;
      bottom: 14px;
      z-index: 10;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(19, 38, 58, 0.86);
      color: #f5f8fb;
      font-size: 12px;
      line-height: 1.4;
      box-shadow: 0 14px 30px rgba(19, 38, 58, 0.2);
    }
  </style>
</head>
<body>
  <div id="embedded-map"></div>

  <section class="panel" aria-label="Embedded map status">
    <div class="title-row">
      <strong>Fuyao Embedded Map</strong>
      <span id="embedded-mode" class="badge">VIEW</span>
      <span id="embedded-status" class="badge">Loading</span>
    </div>
    <p class="hint">URL 参数可控制 center / zoom / marker / mode，宿主可通过 postMessage 或 window.__FUYAO_EMBEDDED_MAP__.receiveHostMessage 控制地图。</p>
    <p id="embedded-coordinates" class="coords">--</p>
    <p id="embedded-error" class="error" hidden></p>
  </section>

  <div class="footer">/map-resources/embedded.html</div>

  <script src="./vendor/maplibre-gl.js"></script>
  <script src="./vendor/pmtiles.js"></script>
  <script>
    if (window.pmtiles && window.maplibregl) {
      window.__FUYAO_PMTILES_PROTOCOL__ = new window.pmtiles.Protocol({ metadata: true });
      window.maplibregl.addProtocol('pmtiles', window.__FUYAO_PMTILES_PROTOCOL__.tile);
    }
  </script>
  <script src="./scripts/fuyaomap-embedded.js"></script>
</body>
</html>

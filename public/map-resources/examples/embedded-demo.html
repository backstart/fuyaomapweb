<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fuyao Embedded Host Demo</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #1f3345;
      background: #edf3f8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(65, 126, 255, 0.1), transparent 32%),
        linear-gradient(180deg, #f4f7fb 0%, #e6edf5 100%);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(300px, 380px) 1fr;
      gap: 18px;
      padding: 18px;
      min-height: 100vh;
    }

    .panel,
    .stage {
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 20px 48px rgba(27, 50, 72, 0.12);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(14px);
    }

    .panel {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.05;
    }

    .panel p,
    .panel label,
    .panel button,
    .panel input,
    .panel select,
    .panel code,
    .panel pre {
      font-size: 13px;
      line-height: 1.55;
    }

    .group {
      display: grid;
      gap: 10px;
    }

    .group-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #5a6d81;
    }

    label {
      display: grid;
      gap: 6px;
      color: #42586c;
    }

    input,
    select,
    button,
    textarea {
      width: 100%;
      border: 1px solid #d5dfeb;
      border-radius: 12px;
      padding: 10px 12px;
      background: #f8fbff;
      color: #213547;
    }

    button {
      cursor: pointer;
      background: linear-gradient(135deg, #1d5eff 0%, #2682ff 100%);
      border: 0;
      color: #f7fbff;
      font-weight: 600;
      transition: transform 0.14s ease, box-shadow 0.14s ease;
      box-shadow: 0 12px 26px rgba(29, 94, 255, 0.24);
    }

    button:hover {
      transform: translateY(-1px);
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .button-row button.secondary {
      background: #e8eef8;
      color: #23415e;
      box-shadow: none;
      border: 1px solid #d2dced;
    }

    .stage {
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .stage-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      background: #f7faff;
      border-bottom: 1px solid #dbe5f1;
    }

    .stage-bar code {
      display: block;
      max-width: 100%;
      word-break: break-all;
      color: #1e496a;
    }

    iframe {
      width: 100%;
      height: 100%;
      min-height: 72vh;
      border: 0;
      background: #dde7f1;
    }

    .log {
      margin: 0;
      min-height: 160px;
      max-height: 260px;
      overflow: auto;
      padding: 12px;
      border-radius: 14px;
      background: #12273c;
      color: #edf5fb;
      white-space: pre-wrap;
    }

    .status-card {
      padding: 12px;
      border-radius: 14px;
      background: #f3f8ff;
      border: 1px solid #d6e3f2;
      color: #23415e;
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 1024px) {
      .layout {
        grid-template-columns: 1fr;
      }

      iframe {
        min-height: 58vh;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <section class="panel">
      <div>
        <h1>Embedded Host Demo</h1>
        <p>这个页面模拟普通网页作为宿主，通过 <code>iframe + postMessage</code> 接入 <code>/map-resources/embedded.html</code>。</p>
      </div>

      <div class="group">
        <div class="group-title">Initial URL Params</div>
        <label>
          Center
          <input id="centerInput" value="113.4445,22.4915" />
        </label>
        <label>
          Zoom
          <input id="zoomInput" value="12" />
        </label>
        <label>
          Marker
          <input id="markerInput" value="113.4445,22.4915" />
        </label>
        <label>
          Mode
          <select id="modeInput">
            <option value="view">view</option>
            <option value="pick" selected>pick</option>
          </select>
        </label>
        <div class="button-row">
          <button id="loadButton">Load Embedded Map</button>
          <button id="reloadButton" class="secondary">Reload Iframe</button>
        </div>
      </div>

      <div class="group">
        <div class="group-title">Host Commands</div>
        <div class="button-row">
          <button id="flyToButton">Fly To Center</button>
          <button id="setMarkerButton" class="secondary">Set Marker</button>
        </div>
        <div class="button-row">
          <button id="clearMarkerButton" class="secondary">Clear Marker</button>
          <button id="zoomInButton" class="secondary">Zoom In</button>
        </div>
      </div>

      <div class="group">
        <div class="group-title">Last Selection</div>
        <div id="selectedPoint" class="status-card">No point selected yet.</div>
      </div>

      <div class="group">
        <div class="group-title">Message Log</div>
        <pre id="messageLog" class="log">Waiting for embedded page...</pre>
      </div>
    </section>

    <section class="stage">
      <div class="stage-bar">
        <strong>iframe src</strong>
        <code id="iframeSrcText">/map-resources/embedded.html</code>
      </div>
      <iframe id="embeddedFrame" title="Fuyao Embedded Map"></iframe>
    </section>
  </div>

  <script>
    const embeddedBaseUrl = '../embedded.html';
    const iframe = document.getElementById('embeddedFrame');
    const iframeSrcText = document.getElementById('iframeSrcText');
    const logEl = document.getElementById('messageLog');
    const selectedPointEl = document.getElementById('selectedPoint');

    function buildIframeUrl() {
      const params = new URLSearchParams();
      const center = document.getElementById('centerInput').value.trim();
      const zoom = document.getElementById('zoomInput').value.trim();
      const marker = document.getElementById('markerInput').value.trim();
      const mode = document.getElementById('modeInput').value;

      if (center) params.set('center', center);
      if (zoom) params.set('zoom', zoom);
      if (marker) params.set('marker', marker);
      if (mode) params.set('mode', mode);

      return params.toString() ? `${embeddedBaseUrl}?${params.toString()}` : embeddedBaseUrl;
    }

    function loadIframe() {
      const url = buildIframeUrl();
      iframe.src = url;
      iframeSrcText.textContent = url;
      appendLog({ type: 'host-load', payload: { url } });
    }

    function appendLog(message) {
      const current = logEl.textContent === 'Waiting for embedded page...' ? '' : `${logEl.textContent}\n\n`;
      logEl.textContent = `${current}${JSON.stringify(message, null, 2)}`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    function postCommand(type, payload) {
      iframe.contentWindow?.postMessage({ type, payload }, '*');
      appendLog({ type: 'host-command', payload: { type, payload } });
    }

    function updateSelectedPoint(message) {
      if (!message || !message.type) {
        return;
      }

      if (message.type === 'map-ready') {
        const center = Array.isArray(message.payload?.center) ? message.payload.center.join(', ') : '--';
        selectedPointEl.textContent = `Map ready. Center: ${center} | Zoom: ${message.payload?.zoom ?? '--'}`;
        return;
      }

      if (message.type === 'map-click') {
        selectedPointEl.textContent = `Picked: ${message.payload.lng}, ${message.payload.lat} | Zoom: ${message.payload.zoom}`;
        return;
      }

      if (message.type === 'marker-updated') {
        if (message.payload?.marker) {
          selectedPointEl.textContent = `Marker: ${message.payload.marker.lng}, ${message.payload.marker.lat} | Count: ${message.payload.markerCount}`;
        } else {
          selectedPointEl.textContent = 'Marker cleared.';
        }
      }
    }

    document.getElementById('loadButton').addEventListener('click', loadIframe);
    document.getElementById('reloadButton').addEventListener('click', () => {
      iframe.contentWindow?.location.reload();
    });
    document.getElementById('flyToButton').addEventListener('click', () => {
      const center = document.getElementById('centerInput').value.trim().split(',').map((item) => Number(item.trim()));
      postCommand('fly-to', { center, zoom: Number(document.getElementById('zoomInput').value || '13') });
    });
    document.getElementById('setMarkerButton').addEventListener('click', () => {
      const marker = document.getElementById('markerInput').value.trim().split(',').map((item) => Number(item.trim()));
      postCommand('set-marker', { lng: marker[0], lat: marker[1], zoom: Number(document.getElementById('zoomInput').value || '13') });
    });
    document.getElementById('clearMarkerButton').addEventListener('click', () => {
      postCommand('clear-marker', {});
    });
    document.getElementById('zoomInButton').addEventListener('click', () => {
      postCommand('set-zoom', { zoom: Number(document.getElementById('zoomInput').value || '12') + 1 });
    });

    window.addEventListener('message', (event) => {
      const message = event.data;
      if (!message || message.source !== 'fuyaomap-embedded') {
        return;
      }

      updateSelectedPoint(message);
      appendLog(message);
    });

    loadIframe();
  </script>
</body>
</html>

server {
    listen 8002;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # 运行时配置文件独立挂载，改完后刷新页面即可生效。
    location = /app-config.js {
        alias /data/fuyaomapweb/runtime/app-config.js;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # 请把 YOUR_BACKEND_HOST 替换为真实后端域名或地址，保留 /api/v1/ 前缀。
        proxy_pass http://fuyaox.com:7165/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    location /tiles/ {
        alias /data/fuyaomap/tiles/;

        types {
            application/octet-stream pmtiles;
        }

        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }
}

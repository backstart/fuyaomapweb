server {
    listen 8002;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # 运行时配置目录由云效 docker run 挂载到 /usr/share/nginx/html/runtime。
    # 前端固定请求 /app-config.js，这里把它映射到挂载目录中的 runtime 文件。
    location = /app-config.js {
        alias /usr/share/nginx/html/runtime/app-config.js;
        add_header Cache-Control "no-store";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # 请把 YOUR_BACKEND_HOST 替换为真实后端域名或地址。
        # 这里必须指向后端，不要错误地写成 fuyaox.com:8002，否则请求会再次打回前端自己。
        proxy_pass http://fuyaox.com:7165/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    location /tiles/ {
        alias /data/tiles/;

        types {
            application/octet-stream pmtiles;
        }

        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }
}

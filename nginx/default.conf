server {
    listen 8002;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;
    client_max_body_size 1024m;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # 运行时配置目录由云效 docker run 挂载到 /usr/share/nginx/html/runtime。
    # 前端固定请求 /app-config.js，这里把它映射到挂载目录中的 runtime 文件。
    location = /app-config.js {
        default_type application/javascript;
        try_files /runtime/app-config.js =404;
        add_header Cache-Control "no-store" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # 请把 YOUR_BACKEND_HOST 替换为真实后端域名或地址。
        # 这里必须指向后端，不要错误地写成 fuyaox.com:8002，否则请求会再次打回前端自己。
        proxy_pass http://10.1.4.12:7165;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_connect_timeout 10s;
    }

    location /map-resources/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type, Range" always;
            add_header Content-Length 0;
            return 204;
        }

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type, Range" always;
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    location /tiles/ {
        alias /data/tiles/;

        types {
            application/octet-stream pmtiles;
        }

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type, Range" always;
            add_header Content-Length 0;
            return 204;
        }

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type, Range" always;
        add_header Access-Control-Expose-Headers "Accept-Ranges, Content-Length, Content-Range, Content-Encoding, ETag, Cache-Control, Expires" always;
        add_header Accept-Ranges "bytes" always;
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }
}
